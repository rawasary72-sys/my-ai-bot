name: Cobra AI Auto Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and Tools
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git openjdk-17-jdk libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython==0.29.33 virtualenv

      - name: Build APK with Buildozer
        run: |
          # دروستکردنی فایلی ڕێکخستن ئەگەر نەبێت
          if [ ! -f buildozer.spec ]; then
            ~/.local/bin/buildozer init
          fi
          
          # ڕێکخستنی کتێبخانەکان (Requirements)
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,kivymd,requests/' buildozer.spec
          
          # قبوڵکردنی مۆڵەتی ئەندرۆید و دەستپێکردنی دروستکردن
          yes | ~/.local/bin/buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cobra-AI-APK
          path: bin/*.apk
